<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Carol's Gourmet</title>

<link rel="stylesheet" href="css/style.css">

<script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.6/dist/JsBarcode.all.min.js"></script>

</head>


<body>


<header class="topo">

<h1>
🍰 Carol's Gourmet
</h1>

<p>
Sistema de Produtos
</p>

</header>



<div class="container">



<section class="card">


<h2>
Cadastro de Produto
</h2>


<input 
id="produto"
placeholder="Nome do produto">


<input 
id="preco"
placeholder="Preço">


<input 
id="estoque"
placeholder="Estoque">


<div id="codigoGerado">

Código será gerado automaticamente

</div>


<button onclick="salvarProduto()">

Salvar Produto

</button>


</section>





<section class="card" id="painelEtiqueta" style="display:none;">


<h2>
Gerar Etiqueta
</h2>


<p>
Produto:
<strong id="produtoEtiquetaNome"></strong>
</p>


<p>
Código:
<strong id="produtoEtiquetaCodigo"></strong>
</p>



<label>
Data fabricação
</label>


<div class="linha">

<input 
id="dataFabricacaoEtiqueta"
type="date"
onchange="calcularValidadeEtiqueta()">



<button onclick="colocarHoje()">
Hoje
</button>

</div>




<label>
Validade
</label>


<input
id="dataValidadeEtiqueta"
type="date"
readonly>




<label>
Quantidade de etiquetas
</label>


<input
id="quantidadeEtiqueta"
type="number"
value="1"
min="1">



<button onclick="imprimirEtiqueta()">

Imprimir Etiquetas

</button>


</section>





<section class="card">


<h2>
Produtos Cadastrados
</h2>


<table>


<thead>

<tr>

<th>Código</th>

<th>Produto</th>

<th>Preço</th>

<th>Estoque</th>

<th>Ações</th>

</tr>


</thead>


<tbody id="lista">

</tbody>


</table>


</section>


</div>



<script src="js/storage.js"></script>


</body>

</html>

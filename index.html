<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Carol's Gourmet</title>

<link rel="stylesheet" href="CSS/style.css">

</head>

<body>

<h1>Carol's Gourmet</h1>

<div class="container">

<h2>Cadastro de Produto</h2>

<input id="codigo" placeholder="Código de barras automático">

<input id="produto" placeholder="Nome do produto">

<input id="preco" placeholder="Preço">

<input id="estoque" placeholder="Estoque">

<button onclick="salvarProduto()">
Salvar Produto
</button>


<h2>Produtos cadastrados</h2>

<table>

<thead>
<tr>
<th>Código</th>
<th>Produto</th>
<th>Preço</th>
<th>Estoque</th>
</tr>
</thead>

<tbody id="lista">

</tbody>

</table>


</div>


<script src="js/storage.js"></script>

</body>
</html>

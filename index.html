<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Carol's Gourmet - Sistema</title>

<link rel="stylesheet" href="css/style.css">

<link rel="preconnect" href="https://fonts.googleapis.com">

<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.6/dist/JsBarcode.all.min.js"></script>

</head>

<body>

<div class="layout">

<!-- MENU -->

<aside class="sidebar">

<div class="logo">

<h2>🍰 Carol's</h2>

<span>Gourmet</span>

</div>

<nav>

<button class="menu ativo">

🏠 Dashboard

</button>

<button class="menu">

📦 Produtos

</button>

<button class="menu">

📈 Estoque

</button>

<button class="menu">

🏷 Etiquetas

</button>

<button class="menu">

⚙ Configurações

</button>

</nav>

</aside>

<!-- CONTEÚDO -->

<main class="conteudo">

<header class="topo">

<div>

<h1>Sistema de Gestão</h1>

<p>Carol's Gourmet</p>

</div>

<div class="usuario">

Rafael

</div>

</header>
<section class="cards">

<div class="card-info">

<h3>Total de Produtos</h3>

<h2 id="totalProdutos">0</h2>

</div>

<div class="card-info">

<h3>Estoque Total</h3>

<h2 id="estoqueTotal">0</h2>

</div>

<div class="card-info">

<h3>Produtos Baixos</h3>

<h2 id="estoqueBaixo">0</h2>

</div>

<div class="card-info">

<h3>Etiquetas Hoje</h3>

<h2 id="etiquetasHoje">0</h2>

</div>

</section>
<section class="card">

<h2>

Cadastro de Produto

</h2>

<div class="grid">

<div>

<label>Código Interno</label>

<input

id="codigoInterno"

readonly>

</div>

<div>

<label>Código de Barras</label>

<input

id="codigo"

readonly>

</div>

</div>

<label>

Nome do Produto

</label>

<input

id="produto"

placeholder="Ex.: Palha Italiana Tradicional">

<div class="grid">

<div>

<label>

Preço

</label>

<input

id="preco"

type="number"

step="0.01">

</div>

<div>

<label>

Estoque Inicial

</label>

<input

id="estoque"

type="number">

</div>

</div>

<button id="btnSalvar">

Salvar Produto

</button>

</section>
<section class="card">

<h2>

Produtos

</h2>

<input

id="pesquisa"

placeholder="Pesquisar produto...">

<table>

<thead>

<tr>

<th>Interno</th>

<th>Produto</th>

<th>Preço</th>

<th>Estoque</th>

<th>Ações</th>

</tr>

</thead>

<tbody id="lista">

</tbody>

</table>

</section>
<section

class="card"

id="painelEtiqueta"

style="display:none;">

<h2>

Gerar Etiquetas

</h2>

<p>

Produto:

<strong

id="produtoEtiqueta">

</strong>

</p>

<label>

Data Fabricação

</label>

<div class="linha">

<input

id="fabricacao"

type="date">

<button

id="btnHoje">

Hoje

</button>

</div>

<label>

Validade

</label>

<input

id="validade"

readonly>

<label>

Quantidade

</label>

<input

id="quantidade"

type="number"

value="1">

<button

id="btnEtiqueta">

Imprimir Etiquetas

</button>

</section>
</main>

</div>

<script src="js/utils.js"></script>

<script src="js/produtos.js"></script>

<script src="js/estoque.js"></script>

<script src="js/etiquetas.js"></script>

<script src="js/app.js"></script>

</body>

</html>

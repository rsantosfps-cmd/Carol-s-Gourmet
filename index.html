<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Carol's Gourmet</title>

<link rel="stylesheet" href="css/style.css">

<!-- Biblioteca para gerar código de barras -->
<script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.6/dist/JsBarcode.all.min.js"></script>

</head>


<body>


<h1>Carol's Gourmet</h1>


<div class="container">

<div id="painelEtiqueta" style="display:none;">

<h2>Gerar Etiqueta</h2>

<label>
Data de fabricação
</label>

<input 
id="dataFabricacaoEtiqueta"
type="date"
onchange="calcularValidadeEtiqueta()">


<label>
Validade
</label>

<input 
id="dataValidadeEtiqueta"
type="date"
readonly>


<button onclick="imprimirEtiqueta()">
Imprimir Etiqueta
</button>


</div>
<h2>Cadastro de Produto</h2>


<input 
<div id="codigoGerado">
Código será gerado automaticamente
</div>

<input 
id="produto" 
placeholder="Nome do produto">

<input 
id="preco" 
placeholder="Preço">

<input 
id="estoque" 
placeholder="Estoque">

<label>
Data de fabricação
</label>

<input 
id="fabricacao" 
type="date"
onchange="calcularValidade()">


<label>
Validade (7 dias)
</label>

<input 
id="validade" 
type="date"
readonly>


<button onclick="salvarProduto()">
Salvar / Atualizar Produto
</button>



<div id="painelEtiqueta" style="display:none;">

<h2>Gerar Etiqueta</h2>


<p>
Produto selecionado:
<strong id="produtoEtiquetaNome"></strong>
</p>


<p>
Código:
<strong id="produtoEtiquetaCodigo"></strong>
</p>



<label>
Data de fabricação
</label>

<input 
id="dataFabricacaoEtiqueta"
type="date"
onchange="calcularValidadeEtiqueta()">



<label>
Validade
</label>

<input 
id="dataValidadeEtiqueta"
type="date"
readonly>



<label>
Quantidade de etiquetas
</label>

<input 
id="quantidadeEtiqueta"
type="number"
value="1"
min="1">



<button onclick="imprimirEtiqueta()">
Imprimir Etiquetas
</button>


</div>


<h2>Produtos cadastrados</h2>



<table>


<thead>

<tr>

<th>Código</th>

<th>Produto</th>

<th>Preço</th>

<th>Estoque</th>

<th>Ações</th>

</tr>

</thead>


<tbody id="lista">

</tbody>


</table>



</div>




<script src="js/storage.js"></script>


</body>

</html>
